name: Release macOS DMG

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Semver tag to build for the dry run, for example v1.2.3. Defaults to v0.0.0 when run from a branch."
        required: false
        type: string

permissions:
  contents: write

concurrency: release-${{ github.ref }}

env:
  CARGO_TERM_COLOR: always
  RELEASE_CHANNEL: oss
  APP_NAME: Slipstream
  DMG_NAME: Slipstream.dmg

jobs:
  release_metadata:
    name: Prepare release metadata
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.metadata.outputs.tag }}
      should_publish: ${{ steps.metadata.outputs.should_publish }}
    steps:
      - name: Validate release tag
        id: metadata
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          REF_TYPE: ${{ github.ref_type }}
          INPUT_TAG: ${{ github.event.inputs.tag }}
        run: |
          set -euo pipefail

          if [[ "$EVENT_NAME" == "push" ]]; then
            TAG="$REF_NAME"
            SHOULD_PUBLISH="true"
          else
            SHOULD_PUBLISH="false"
            if [[ -n "${INPUT_TAG:-}" ]]; then
              TAG="$INPUT_TAG"
            elif [[ "$REF_TYPE" == "tag" ]]; then
              TAG="$REF_NAME"
            else
              TAG="v0.0.0"
            fi
          fi

          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Release tag '$TAG' must match vMAJOR.MINOR.PATCH, for example v1.2.3."
            exit 1
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "should_publish=$SHOULD_PUBLISH" >> "$GITHUB_OUTPUT"

  validate_signing_secrets:
    name: Validate signing secrets
    runs-on: ubuntu-latest
    needs: release_metadata
    steps:
      - name: Fail fast if signing secrets are missing
        shell: bash
        env:
          WARP_DEVELOPER_ID_CERT: ${{ secrets.WARP_DEVELOPER_ID_CERT }}
          WARP_DEVELOPER_ID_CERT_PASSWORD: ${{ secrets.WARP_DEVELOPER_ID_CERT_PASSWORD }}
          WARP_CODESIGN_KEYCHAIN_PASSWORD: ${{ secrets.WARP_CODESIGN_KEYCHAIN_PASSWORD }}
          WARP_NOTARIZATION_APPLE_ID: ${{ secrets.WARP_NOTARIZATION_APPLE_ID }}
          WARP_NOTARIZATION_PASSWORD: ${{ secrets.WARP_NOTARIZATION_PASSWORD }}
          WARP_APPLE_TEAM_ID: ${{ secrets.WARP_APPLE_TEAM_ID }}
        run: |
          set -euo pipefail

          required=(
            WARP_DEVELOPER_ID_CERT
            WARP_DEVELOPER_ID_CERT_PASSWORD
            WARP_CODESIGN_KEYCHAIN_PASSWORD
            WARP_NOTARIZATION_APPLE_ID
            WARP_NOTARIZATION_PASSWORD
            WARP_APPLE_TEAM_ID
          )

          missing=()
          for name in "${required[@]}"; do
            if [[ -z "${!name:-}" ]]; then
              missing+=("$name")
            fi
          done

          if (( ${#missing[@]} > 0 )); then
            printf '::error::Missing required signing secret(s): %s\n' "${missing[*]}"
            exit 1
          fi

  build_arm64:
    name: Build macOS Apple Silicon
    runs-on: macos-26
    needs:
      - release_metadata
      - validate_signing_secrets
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: ./.github/actions/prepare_environment
        with:
          target_os: macos
          is_self_hosted: false
          install_release_deps: true
          cache_key: release-macos-arm64

      - name: Ensure Rust target is installed
        run: rustup target add aarch64-apple-darwin
        shell: bash

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: stable

      - name: Install cargo-bundle
        run: script/install_cargo_bundle
        shell: bash

      - name: Install create-dmg
        run: brew install create-dmg
        shell: bash

      - name: Build unsigned Apple Silicon bundle
        id: bundle_app
        run: |
          set -euo pipefail
          script/bundle \
            --nosign \
            --channel "$RELEASE_CHANNEL" \
            --arch aarch64 \
            --release-tag "$TAG" \
            --dmg-name-suffix arm64
        shell: bash
        env:
          TAG: ${{ needs.release_metadata.outputs.tag }}

      - name: Archive Apple Silicon build inputs
        shell: bash
        env:
          BINARY_PATH: ${{ steps.bundle_app.outputs.binary_path }}
          DOCK_TILE_PLUGIN_DIR: ${{ steps.bundle_app.outputs.dock_tile_plugin_dir }}
          DSYM_PATH: ${{ steps.bundle_app.outputs.dsym_path }}
          DSYM_REALPATH: ${{ steps.bundle_app.outputs.dsym_realpath }}
        run: |
          set -euo pipefail

          paths=(
            "$BINARY_PATH"
            "$DOCK_TILE_PLUGIN_DIR"
          )

          if [[ -n "${DSYM_PATH:-}" && -e "$DSYM_PATH" ]]; then
            paths+=("$DSYM_PATH")
          fi

          if [[ -n "${DSYM_REALPATH:-}" && -e "$DSYM_REALPATH" ]]; then
            paths+=("$DSYM_REALPATH")
          fi

          for path in "${paths[@]}"; do
            if [[ ! -e "$path" ]]; then
              echo "::error::Expected build input '$path' does not exist."
              exit 1
            fi
          done

          tar czf build-inputs-aarch64.tar.gz "${paths[@]}"

      - name: Upload Apple Silicon build inputs
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: macos-aarch64-${{ needs.release_metadata.outputs.tag }}
          retention-days: 1
          compression-level: 0
          path: build-inputs-aarch64.tar.gz

  package_arm64:
    name: Package notarized Apple Silicon DMG
    runs-on: macos-26
    needs:
      - release_metadata
      - validate_signing_secrets
      - build_arm64
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: ./.github/actions/prepare_environment
        with:
          target_os: macos
          is_self_hosted: false
          install_release_deps: true
          cache_key: release-macos-arm64

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: stable

      - name: Download aarch64 build inputs
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: macos-aarch64-${{ needs.release_metadata.outputs.tag }}
          path: artifacts/aarch64

      - name: Extract aarch64 build inputs
        run: tar xzf artifacts/aarch64/build-inputs-aarch64.tar.gz
        shell: bash

      - name: Install cargo-bundle
        run: script/install_cargo_bundle
        shell: bash

      - name: Install create-dmg
        run: brew install create-dmg
        shell: bash

      - name: Bundle, sign, and notarize Apple Silicon app
        id: bundle_app
        run: |
          set -euo pipefail
          script/bundle \
            --skip-build \
            --read-passwords-from-env \
            --channel "$RELEASE_CHANNEL" \
            --arch aarch64 \
            --release-tag "$TAG"
        shell: bash
        env:
          TAG: ${{ needs.release_metadata.outputs.tag }}
          WARP_DEVELOPER_ID_CERT: ${{ secrets.WARP_DEVELOPER_ID_CERT }}
          WARP_DEVELOPER_ID_CERT_PASSWORD: ${{ secrets.WARP_DEVELOPER_ID_CERT_PASSWORD }}
          WARP_CODESIGN_KEYCHAIN_PASSWORD: ${{ secrets.WARP_CODESIGN_KEYCHAIN_PASSWORD }}
          WARP_NOTARIZATION_APPLE_ID: ${{ secrets.WARP_NOTARIZATION_APPLE_ID }}
          WARP_NOTARIZATION_PASSWORD: ${{ secrets.WARP_NOTARIZATION_PASSWORD }}
          WARP_APPLE_TEAM_ID: ${{ secrets.WARP_APPLE_TEAM_ID }}

      - name: Validate notarized artifact
        shell: bash
        env:
          DMG_PATH: ${{ steps.bundle_app.outputs.dmg_path }}
        run: |
          set -euo pipefail

          APP_PATH="target/release-lto/bundle/osx/$APP_NAME.app"
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"
          xcrun stapler validate "$DMG_PATH"
          spctl -a -t open --context context:primary-signature -vv "$DMG_PATH"
          hdiutil verify "$DMG_PATH"

      - name: Prepare release assets
        shell: bash
        env:
          DMG_PATH: ${{ steps.bundle_app.outputs.dmg_path }}
        run: |
          set -euo pipefail

          mkdir -p dist
          cp "$DMG_PATH" "dist/$DMG_NAME"
          (
            cd dist
            shasum -a 256 "$DMG_NAME" > SHA256SUMS
          )

      - name: Upload DMG workflow artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: slipstream-macos-${{ needs.release_metadata.outputs.tag }}
          retention-days: 14
          if-no-files-found: error
          path: dist/*

  publish_release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - release_metadata
      - package_arm64
    if: ${{ needs.release_metadata.outputs.should_publish == 'true' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Download release assets
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: slipstream-macos-${{ needs.release_metadata.outputs.tag }}
          path: dist

      - name: Create or update GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.release_metadata.outputs.tag }}
        run: |
          set -euo pipefail

          cd dist
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "$DMG_NAME" SHA256SUMS --clobber
          else
            gh release create "$TAG" "$DMG_NAME" SHA256SUMS \
              --verify-tag \
              --title "Slipstream $TAG" \
              --generate-notes
          fi
