name: Session Sharing Relay Image

on:
  pull_request:
    paths:
      - '.github/workflows/session-sharing-relay-image.yml'
      - 'crates/session-sharing-relay/**'
      - 'Cargo.lock'
  push:
  workflow_dispatch:

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/warp-session-sharing-relay
  SHOULD_PUBLISH: ${{ github.event_name == 'push' && (github.ref == 'refs/heads/byok' || github.ref == 'refs/heads/master') }}

jobs:
  build:
    name: Build and publish image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout sources
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: env.SHOULD_PUBLISH == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/byok' || github.ref == 'refs/heads/master' }}

      - name: Build and publish
        uses: docker/build-push-action@v6
        with:
          context: crates/session-sharing-relay
          file: crates/session-sharing-relay/Dockerfile
          push: ${{ env.SHOULD_PUBLISH == 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
